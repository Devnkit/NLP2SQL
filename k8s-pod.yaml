apiVersion: v1
kind: Pod
metadata:
  name: nlp2sql-pod
  labels:
    app: nlp2sql
spec:
  containers:
    - name: nlp2sql-container
      image: nlp2sql:latest
      ports:
        - containerPort: 8000
      env:
        - name: OPENAI_API_KEY
          value: "your-api-key-here"
      resources:
        limits:
          memory: "512Mi"
          cpu: "500m"
        requests:
          memory: "256Mi"
          cpu: "250m"